# Сборка образа API. Контекст = корень репо, Dockerfile = services/api/Dockerfile.
# Запуск из корня репозитория:
#   gcloud builds submit --config=cloudbuild-api.yaml --substitutions=_IMAGE=REGISTRY/IMAGE:TAG .
# Пример:
#   gcloud builds submit --config=cloudbuild-api.yaml --substitutions=_IMAGE=europe-west1-docker.pkg.dev/YOUR_PROJECT_ID/api/api:latest .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'services/api/Dockerfile', '-t', '${_IMAGE}', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

images:
  - '${_IMAGE}'

options:
  logging: CLOUD_LOGGING_ONLY
