services:
  postgres:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  livekit:
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:7880 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    environment:
      NODE_ENV: production
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      AUTH_REFRESH_COOKIE_SECURE: "true"
      AUTH_REFRESH_COOKIE_SAMESITE: "none"
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-https://example.com/media}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  ws-gateway:
    environment:
      NODE_ENV: production
      WS_ALLOWED_ORIGIN: ${WS_ALLOWED_ORIGIN}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: collab-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      ws-gateway:
        condition: service_healthy
    volumes:
      - ./nginx/collab.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - media_data:/var/www/media:ro
    ports:
      - "80:80"
      - "443:443"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  media_data:
