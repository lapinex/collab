map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream collab_web {
  server web:3000;
}

upstream collab_api {
  server api:4000;
}

upstream collab_ws {
  server ws-gateway:4001;
}

server {
  listen 80;
  server_name collab.example.com api.example.com ws.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name collab.example.com;
  client_max_body_size 20m;

  ssl_certificate /etc/nginx/certs/collab.example.com.pem;
  ssl_certificate_key /etc/nginx/certs/collab.example.com.key;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://collab_api/api/;
  }

  location /media/ {
    alias /var/www/media/;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  # Next immutable build assets (css/js chunks with content hash)
  location ^~ /_next/static/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://collab_web;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Avoid sending multiple Cache-Control headers (upstream + nginx),
    # which can confuse edge caches and cause variant mixing.
    proxy_hide_header Cache-Control;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    proxy_pass http://collab_web/;
  }
}

server {
  listen 443 ssl http2;
  server_name api.example.com;
  client_max_body_size 20m;

  ssl_certificate /etc/nginx/certs/collab.example.com.pem;
  ssl_certificate_key /etc/nginx/certs/collab.example.com.key;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://collab_api/;
  }
}

server {
  listen 443 ssl http2;
  server_name ws.example.com;
  client_max_body_size 20m;

  ssl_certificate /etc/nginx/certs/collab.example.com.pem;
  ssl_certificate_key /etc/nginx/certs/collab.example.com.key;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_pass http://collab_ws/;
  }
}
