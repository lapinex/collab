# Сборка образа Next.js (collab-web). NEXT_PUBLIC_API_URL передаётся как build-arg при сборке!
# Rewrites в next.config.js подставляются при next build — без этого прокси идёт на localhost:4000.
#
# Запуск из корня репозитория:
#   gcloud builds submit --config=cloudbuild-web.yaml .
# или с переопределением:
#   gcloud builds submit --config=cloudbuild-web.yaml --substitutions=_IMAGE=...,_NEXT_PUBLIC_API_URL=https://твой-api.run.app .

substitutions:
  _IMAGE: 'europe-west1-docker.pkg.dev/YOUR_PROJECT_ID/web/web:latest'
  _NEXT_PUBLIC_API_URL: 'https://YOUR_API.run.app'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}'
      - '-t'
      - '${_IMAGE}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

images:
  - '${_IMAGE}'

options:
  logging: CLOUD_LOGGING_ONLY
